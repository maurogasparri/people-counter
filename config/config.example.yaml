# =============================================================================
# People Counter — Device Configuration
# =============================================================================
#
# Configuration strategy:
#
# LOCAL (this file) — Hardware-intrinsic settings. Only change with physical
#   access or SSH. Set once during installation.
#
# CLOUD (AWS IoT Device Shadow) — Business-driven settings. Pushed from the
#   cloud without touching the device. Shadow values override local defaults.
#
# NOT IMPLEMENTED (deferred post-MVP) — Features to add later.
#
# =============================================================================

# --- LOCAL: Device identity (set once during provisioning) ---
device:
  id: "store-001-cam-01"          # Unique device ID (matches IoT Core thing name)
  store_id: "store-001"           # Site/store identifier
  store_name: "Store Name"        # Human-readable (display only)

# --- LOCAL: Camera & stereo hardware (depends on physical installation) ---
vision:
  camera_left: 1                  # CSI bus ID for left IMX708 (CAM1 = izquierda mirando desde la cámara hacia la escena)
  camera_right: 0                 # CSI bus ID for right IMX708 (CAM0 = derecha mirando desde la cámara hacia la escena)
  resolution: [4608, 2592]        # Sensor native resolution (IMX708 12MP)
  fps: 15                         # Capture frame rate
  baseline_cm: 14                 # Physical distance between cameras (measured)
  calibration_file: "/etc/people-counter/calibration.npz"  # ChArUco stereo cal output
  mounting_height_m: 3.5          # Ceiling height in meters
  counting_line_y: 0.5            # Virtual line position (0.0=top, 1.0=bottom)
  # SGBM depth parameters (tuned per installation)
  # f_px ~ 1330 at full res; disparity at 3m ~ 62px, at 1.3m ~ 143px
  num_disparities: 192            # Must be divisible by 16. Covers ~1.3-6m range.
  block_size: 9                   # Odd number, typically 5-15

# --- LOCAL: Detection model (compiled for Hailo-8L, won't change remotely) ---
detection:
  model_path: "/usr/src/people-counter/models/yolov8n.hef"  # HEF compiled for Hailo-8L 13T
  confidence_threshold: 0.5       # Person detection confidence
  nms_threshold: 0.45             # Non-maximum suppression IoU threshold

# --- LOCAL: Tracker parameters ---
tracking:
  max_disappeared: 30             # Frames before dropping a track
  max_distance: 50                # Max pixel distance for track association

# --- LOCAL: WiFi/BLE probe capture hardware ---
wifi_ble:
  enabled: true                   # Master switch (overridable from cloud)
  wifi_interface: "wlan0"         # Monitor-mode interface for probe capture
  ble_enabled: true               # BLE advertising capture
  probe_interval_seconds: 900     # Aggregation window (15 min)
  # Dual RSSI thresholds:
  #   passerby = -75 dBm → present in the zone
  #   shopper  = -55 dBm → very close / entered
  #   Turn In Rate = shoppers / passersby
  rssi_passerby_threshold: -75
  rssi_shopper_threshold: -55
  cross_protocol_window_seconds: 2
  cross_protocol_rssi_delta: 5

# --- LOCAL: MQTT connection (certs are per-device, set during provisioning) ---
mqtt:
  endpoint: "xxxxx.iot.us-east-1.amazonaws.com"
  port: 8883
  cert_path: "/etc/people-counter/certs/device.pem.crt"
  key_path: "/etc/people-counter/certs/device.pem.key"
  ca_path: "/etc/people-counter/certs/AmazonRootCA1.pem"
  topics:
    counting: "store/{store_id}/counting"
    wifi_ble: "store/{store_id}/wifi_ble"
    telemetry: "store/{store_id}/telemetry"
    shadow: "$aws/things/{device_id}/shadow"  # For cloud config sync

# --- LOCAL: Buffer & logging ---
buffer:
  db_path: "/var/lib/people-counter/buffer.db"
  max_age_hours: 72

logging:
  level: "INFO"
  format: "json"
  file: "/var/log/people-counter/app.log"

# --- LOCAL: Telemetry defaults (overridable from cloud) ---
telemetry:
  interval_seconds: 300           # Report CPU temp, uptime, etc. every 5 min

# =============================================================================
# CLOUD-PUSHED CONFIG (AWS IoT Device Shadow)
# =============================================================================
# These values are defaults. On startup the device fetches its IoT Shadow
# and merges cloud values over these. Cloud takes precedence.
#
# To push a change:
#   aws iot-data update-thing-shadow --thing-name <device_id> \
#     --payload '{"state":{"desired":{"operating_hours":{"monday":"10:00-22:00"}}}}'
#
# The device subscribes to shadow/update/delta and applies changes at runtime.
# =============================================================================
cloud_defaults:
  # Operating hours per day of week. Site-level config — the cloud pushes
  # the same schedule to all devices in a store.
  # Format: "HH:MM-HH:MM" or null for closed
  operating_hours:
    monday: "10:00-22:00"
    tuesday: "10:00-22:00"
    wednesday: "10:00-22:00"
    thursday: "10:00-22:00"
    friday: "10:00-22:00"
    saturday: "10:00-22:00"
    sunday: "10:00-21:00"

  # Post-calibration correction multiplier. Default 1.0 = no correction.
  footfall_scaling_factor: 1.0

  # Runtime overrides (can be toggled from cloud without SSH)
  counting_enabled: true          # Pause counting during maintenance
  wifi_ble_enabled: true          # Disable WiFi/BLE for legal/privacy reasons
  telemetry_interval_seconds: 300 # Can be reduced for debugging

# =============================================================================
# NOT IMPLEMENTED — Deferred post-MVP
# =============================================================================
# These features are documented for future reference but NOT active in code.
#
